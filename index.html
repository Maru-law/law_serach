<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>条文検索アプリ v2</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #dcdde1;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            color: #34495e;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #result {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 150px;
        }

        .article-header {
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .paragraph { margin-bottom: 12px; position: relative; padding-left: 1.5em; }
        .paragraph-num { position: absolute; left: 0; font-weight: bold; }
        .item { margin-left: 2.5em; text-indent: -1.2em; font-size: 0.95rem; color: #555; margin-top: 5px; }

        .error-msg { color: #e74c3c; text-align: center; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>条文検索システム</h1>

    <div class="search-box">
        <div class="input-group">
            <input type="number" id="artNum" placeholder="条" min="1">
            <span>条</span>
        </div>
        <div class="input-group">
            <span>の</span>
            <input type="text" id="branchNum" placeholder="枝番 (1は省略可)">
        </div>
        <button id="searchBtn">検索</button>
    </div>

    <div id="result">
        <p style="color: #999; text-align: center;">条文番号を入力してください。</p>
    </div>
</div>

<script>
    let lawData = null;

    async function init() {
        try {
            const response = await fetch('data.json');
            lawData = await response.json();
        } catch (e) {
            document.getElementById('result').innerHTML = '<p class="error-msg">データのロードに失敗しました。</p>';
        }
    }

    function executeSearch() {
        if (!lawData) return;

        const art = document.getElementById('artNum').value;
        const branchInput = document.getElementById('branchNum').value.trim();
        const resultDiv = document.getElementById('result');

        if (!art) return;

        let targetData = null;
        let finalKey = "";

        // 検索ロジックの核：枝番が空または1の場合の正規化
        if (!branchInput || branchInput === "1") {
            if (lawData[art]) {
                targetData = lawData[art];
                finalKey = art;
            } else if (lawData[`${art}_1`]) {
                targetData = lawData[`${art}_1`];
                finalKey = `${art}_1`;
            }
        } else {
            // 枝番が2以上の場合
            const key = `${art}_${branchInput}`;
            if (lawData[key]) {
                targetData = lawData[key];
                finalKey = key;
            }
        }

        if (targetData) {
            render(targetData, finalKey);
        } else {
            resultDiv.innerHTML = '<p class="error-msg">該当する条文が見つかりません。</p>';
        }
    }

    function render(data, key) {
        // 表示用の条文番号ラベルを作成
        const label = key.includes('_') ? `第${key.replace('_', '条の')}` : `第${key}条`;
        
        let html = `<div class="article-header">${label} ${data.title}</div>`;
        
        data.paragraphs.forEach((p, i) => {
            html += `<div class="paragraph">`;
            if (data.paragraphs.length > 1 || i > 0) {
                html += `<span class="paragraph-num">${i + 1}</span>`;
            }
            html += `${p.text}</div>`;

            if (p.items) {
                p.items.forEach(item => {
                    html += `<div class="item">${item.label}　${item.text}</div>`;
                });
            }
        });
        document.getElementById('result').innerHTML = html;
    }

    document.getElementById('searchBtn').addEventListener('click', executeSearch);
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', e => { if (e.key === 'Enter') executeSearch(); });
    });

    init();
</script>

</body>
</html>
