<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法令条文検索 Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>法令条文検索</h1>
            <div class="search-container">
                <select id="law-select">
                    <option value="constitution">日本国憲法</option>
                    <option value="civil_code">民法</option>
                </select>
                <input type="text" id="article-num" placeholder="条文番号を入力 (例: 10, 1_2)">
                <button id="search-btn">検索</button>
            </div>
        </header>

        <main id="result-area">
            <div class="placeholder">条文番号を入力して検索してください。</div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
