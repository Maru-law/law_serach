<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法令条文検索ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel-bg: #f8f9fa;
            --border-color: #dee2e6;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --text-main: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: #f0f2f5;
        }

        /* レイアウト構成 */
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側：検索パネル (30%) */
        .search-panel {
            width: 30%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 10;
        }

        /* 右側：表示エリア (70%) */
        .display-area {
            width: 70%;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        h2 { font-size: 1.2rem; margin-bottom: 10px; border-left: 4px solid var(--primary-color); padding-left: 10px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 0.9rem; }

        input, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .major-laws {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .major-laws button {
            padding: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: 0.2s;
        }

        .major-laws button:hover { background: var(--accent-color); color: white; }

        .article-input-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .article-input-row input { width: 80px; text-align: center; }

        /* 条文カードUI */
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 25px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--panel-bg);
            padding-bottom: 10px;
        }

        .law-title-tag {
            font-size: 0.8rem;
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
            line-height: 1;
        }
        .delete-btn:hover { color: #e74c3c; }

        .card-content {
            font-family: 'Noto Serif JP', serif;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .article-title {
            font-weight: bold;
            color: var(--primary-color);
            display: block;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .load-more-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px dashed var(--border-color);
            color: #666;
            cursor: pointer;
            border-radius: 4px;
        }
        .load-more-btn:hover { background: #eee; }

        /* スクロールバー装飾 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <aside class="search-panel">
        <h2>法令検索</h2>
        
        <div class="form-group">
            <label>法令名（オートコンプリート）</label>
            <input type="text" id="lawNameInput" list="lawList" placeholder="例：民法">
            <datalist id="lawList">
                <option value="日本国憲法">
                <option value="民法">
                <option value="刑法">
                <option value="商法">
                <option value="民事訴訟法">
                <option value="刑事訴訟法">
                <option value="会社法">
                <option value="労働基準法">
            </datalist>
        </div>

        <div class="form-group">
            <label>主要法令から選択</label>
            <div class="major-laws">
                <button onclick="selectLaw('日本国憲法')">憲法</button>
                <button onclick="selectLaw('民法')">民法</button>
                <button onclick="selectLaw('刑法')">刑法</button>
                <button onclick="selectLaw('商法')">商法</button>
                <button onclick="selectLaw('民事訴訟法')">民訴法</button>
                <button onclick="selectLaw('刑事訴訟法')">刑訴法</button>
            </div>
        </div>

        <div class="form-group">
            <label>条文番号</label>
            <div class="article-input-row">
                <input type="text" id="artNum" placeholder="110">
                <span>条の</span>
                <input type="text" id="subArtNum" placeholder="2">
            </div>
            <p style="font-size: 0.75rem; color: #666;">※入力すると自動で検索されます</p>
        </div>

        <div style="margin-top: auto; font-size: 0.8rem; color: #999;">
            Data Source: e-Gov法令API<br>
            Powered by corsproxy.io
        </div>
    </aside>

    <main class="display-area" id="displayArea">
        </main>
</div>

<script>
    const PROXY_URL = "https://corsproxy.io/?";
    const API_BASE = "https://elaws.e-gov.go.jp/api/1/lawdata/";
    
    // キャッシュ: 同一セッション内でのAPI呼び出しを抑制
    const lawCache = new Map();

    const lawNameInput = document.getElementById('lawNameInput');
    const artNumInput = document.getElementById('artNum');
    const subArtNumInput = document.getElementById('subArtNum');
    const displayArea = document.getElementById('displayArea');

    // 全角数字を半角に変換する関数
    function toHalfWidth(str) {
        return str.replace(/[０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
    }

    function selectLaw(name) {
        lawNameInput.value = name;
        triggerSearch();
    }

    // 入力を監視して自動検索 (デバウンス処理)
    let debounceTimer;
    [lawNameInput, artNumInput, subArtNumInput].forEach(el => {
        el.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(triggerSearch, 800);
        });
    });

    async function triggerSearch() {
        const lawName = lawNameInput.value.trim();
        const art = toHalfWidth(artNumInput.value.trim());
        const sub = toHalfWidth(subArtNumInput.value.trim());

        if (!lawName || !art) return;

        // すでに同じ検索内容のカードが表示されていないかチェック（簡易版）
        createArticleCard(lawName, art, sub);
    }

    async function getLawData(lawName) {
        if (lawCache.has(lawName)) return lawCache.get(lawName);

        try {
            // 法令名からデータを取得
            const response = await fetch(`${PROXY_URL}${API_BASE}${encodeURIComponent(lawName)}`);
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            // エラーチェック
            if (xmlDoc.getElementsByTagName("Error").length > 0) {
                throw new Error("法令が見つかりませんでした。");
            }

            lawCache.set(lawName, xmlDoc);
            return xmlDoc;
        } catch (error) {
            console.error(error);
            return null;
        }
    }

    async function createArticleCard(lawName, artNum, subArtNum) {
        const xmlDoc = await getLawData(lawName);
        if (!xmlDoc) return;

        // 条文番号の検索用文字列作成 (e-Gov XML形式: 110_2 のような形式)
        const targetNum = subArtNum ? `${artNum}_${subArtNum}` : artNum;
        
        const articleNode = findArticleNode(xmlDoc, targetNum);
        
        if (articleNode) {
            renderCard(lawName, articleNode, xmlDoc);
        }
    }

    function findArticleNode(xmlDoc, numStr) {
        // ArticleタグのNum属性が一致するものを探す
        const articles = xmlDoc.getElementsByTagName("Article");
        for (let art of articles) {
            if (art.getAttribute("Num") === numStr) {
                return art;
            }
        }
        return null;
    }

    function renderCard(lawName, node, fullXml) {
        const card = document.createElement('div');
        card.className = 'card';
        
        const articleNum = node.getAttribute("Num");
        
        // ヘッダー作成
        const header = document.createElement('div');
        header.className = 'card-header';
        header.innerHTML = `
            <div>
                <span class="law-title-tag">${lawName}</span>
                <span class="article-title">${node.getElementsByTagName("ArticleTitle")[0]?.textContent || ""}</span>
            </div>
            <button class="delete-btn" onclick="this.closest('.card').remove()">×</button>
        `;

        // 本文作成
        const content = document.createElement('div');
        content.className = 'card-content';
        content.innerHTML = parseArticleHTML(node);

        card.appendChild(header);
        card.appendChild(content);

        // 次の条文読み込みボタン
        const nextBtn = document.createElement('button');
        nextBtn.className = 'load-more-btn';
        nextBtn.innerText = "次の条文を読み込む ↓";
        nextBtn.onclick = () => {
            const nextNode = node.nextElementSibling;
            if (nextNode && nextNode.tagName === "Article") {
                const nextContent = document.createElement('div');
                nextContent.style.marginTop = "30px";
                nextContent.style.paddingTop = "20px";
                nextContent.style.borderTop = "1px dashed #ddd";
                nextContent.innerHTML = `<span class="article-title">${nextNode.getElementsByTagName("ArticleTitle")[0]?.textContent || ""}</span>` + parseArticleHTML(nextNode);
                content.appendChild(nextContent);
                // ボタンの対象を次に更新
                node = nextNode; 
            } else {
                nextBtn.innerText = "これ以降の条文はありません。";
                nextBtn.disabled = true;
            }
        };
        card.appendChild(nextBtn);

        displayArea.prepend(card); // 新しいものを上に
    }

    // XMLノードを人間が読みやすいHTMLに変換
    function parseArticleHTML(articleNode) {
        let html = "";
        const paragraphs = articleNode.getElementsByTagName("Paragraph");
        
        for (let p of paragraphs) {
            const pNum = p.getElementsByTagName("ParagraphNum")[0]?.textContent || "";
            const pSentence = Array.from(p.getElementsByTagName("ParagraphSentence"))
                                .map(s => s.textContent).join("<br>");
            
            // 項番号がある場合は表示（第1項以外や、明示的な番号がある場合）
            const pLabel = pNum && pNum !== "1" ? `<small style="color:#888; margin-right:8px;">(${pNum})</small>` : "";
            html += `<div style="margin-bottom:12px;">${pLabel}${pSentence}</div>`;

            // 号 (Item) の処理
            const items = p.getElementsByTagName("Item");
            for (let item of items) {
                const iNum = item.getElementsByTagName("ItemTitle")[0]?.textContent || "";
                const iSentence = item.getElementsByTagName("ItemSentence")[0]?.textContent || "";
                html += `<div style="margin-left:20px; font-size:0.95em;">${iNum}　${iSentence}</div>`;
            }
        }
        return html;
    }
</script>

</body>
</html>
